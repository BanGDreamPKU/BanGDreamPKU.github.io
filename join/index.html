<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/assets/symbol.png">
    <title>组合数学 · 加群</title>
    <link rel="stylesheet" href="/common/theme.css">
    <style>
        .join {
            max-width: 34rem;
            margin: 0 auto;
        }

        .join-head {
            border-left: 6px solid var(--ros);
            padding-left: 1.4rem;
            margin-bottom: 2rem;
        }

        .qr-sheet {
            text-align: center;
        }

        .qr-frame {
            width: 260px;
            max-width: 78vw;
            aspect-ratio: 1 / 1;
            margin: .4rem auto 1.2rem;
            border: 1px solid var(--hair);
            border-radius: var(--radius);
            background: var(--paper);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qr-frame img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .qr-caption {
            font-family: var(--font-mono);
            font-size: .8rem;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--ink-faint);
            margin: 0 0 .6rem;
        }

        .loading {
            color: var(--ink-faint);
            font-family: var(--font-mono);
            font-size: .9rem;
        }

        .error {
            color: var(--pku);
            font-weight: 600;
            line-height: 1.7;
            padding: 0 8px;
        }

        /* 入群两步：编号步骤 */
        .join-steps {
            list-style: none;
            counter-reset: js;
            padding: 0;
            margin: 1.6rem 0 0;
        }

        .join-steps li {
            counter-increment: js;
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 14px;
            padding: 12px 0;
            border-top: 1px dashed var(--hair);
            color: var(--ink-soft);
            line-height: 1.7;
        }

        .join-steps li:first-child {
            border-top: 0;
        }

        .join-steps li::before {
            content: counter(js, decimal-leading-zero);
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: .82rem;
            color: var(--ros);
            padding-top: .2rem;
        }
    </style>
</head>

<body>
    <div id="top-bar-placeholder" chinese_pathname="/加群"></div>
    <script src="/common/top-bar/load.js"></script>
    <script src="/common/card-bg.js"></script>

    <div class="wrap wrap--read">
        <div class="join">
            <header class="join-head">
                <p class="eyebrow reveal" style="margin-bottom:.5rem;">加入组合数学</p>
                <h1 class="page-title reveal">➕ 我要加群<span class="en">Join the Circle</span></h1>
                <p class="lede reveal">这是一个由北京大学 BanG Dream! 爱好者组成的兴趣社群。始于国服，也欢迎日服玩家，甚至只想聊剧情、二创和企划新闻的朋友——只要不是完全不知道邦邦就行。</p>
            </header>

            <div class="sheet qr-sheet">
                <p class="qr-caption">扫码进入入口群</p>
                <div class="qr-frame">
                    <div id="qr-container">
                        <p class="loading">正在加载二维码…</p>
                    </div>
                </div>
                <ol class="join-steps" style="text-align:left;">
                    <li><span>扫码加入<strong>入口群</strong>。</span></li>
                    <li><span>在入口群内添加好友，由好友邀请进入正式群（受微信群人数限制所致）。</span></li>
                </ol>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="foot-inner">
            <span>组合数学 · 北京大学 BanG Dream! 玩家群</span>
            <span class="foot-mono">C(n, k)</span>
        </div>
    </footer>

    <script>
        // 二维码托管在校内服务器，仅北京大学校园网 (CERNET2 IPv6) 可访问。
        // 校外来源会被服务器 403 拒绝，图片加载失败后显示提示。
        document.addEventListener('DOMContentLoaded', function () {
            const qrContainer = document.getElementById('qr-container');
            const img = new Image();
            img.alt = '入群二维码';
            img.onload = function () {
                qrContainer.innerHTML = '';
                qrContainer.appendChild(img);
            };
            img.onerror = function () {
                qrContainer.innerHTML =
                    `<p class="error">加载失败，请使用校园网，或在树洞 5542735 获取校外访问链接。</p>`;
            };
            img.src = 'https://comb947.dedyn.io/qr.png';
        });
    </script>
    <script src="/common/reveal.js"></script>
</body>

</html>
